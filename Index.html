<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nourou Shop</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#e91e63;color:white;padding:15px;text-align:center;font-size:20px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card img{width:100%;height:150px;object-fit:cover}
.card-body{padding:10px}
.card-body h3{margin:0;font-size:14px}
.card-body p{margin:5px 0;color:#e91e63;font-weight:bold}
button{background:#e91e63;color:white;border:none;padding:8px;border-radius:5px;width:100%;cursor:pointer}
</style>
</head>
<body>
<header>Nourou Shop</header>
<div id="liste" class="grid">Chargement...</div>

<script>
let produits = [];

fetch('produits.json')
  .then(r => r.json())
  .then(data => {
    produits = data;
    afficher();
  });

function afficher(){
  let html = '';
  produits.forEach(p => {
    html += `
    <div class="card">
      <img src="${p.img}" alt="${p.nom}">
      <div class="card-body">
        <h3>${p.nom}</h3>
        <p>${p.prix} FCFA</p>
        <button>Ajouter</button>
      </div>
    </div>`;
  });
  document.getElementById('liste').innerHTML = html;
}
</script>
</body>
</html>
