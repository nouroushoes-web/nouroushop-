<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabila Shopping</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E91E63">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}
header{background:#E91E63;color:white;padding:12px;text-align:center}
header h1{font-size:20px}
.menu{display:flex;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.menu button{flex:1;padding:12px;border:none;background:#fff;cursor:pointer;font-weight:bold}
.menu button.actif{background:#E91E63;color:white}
.section{display:none;padding:10px}
.section.actif{display:block}
.search{padding:10px;background:white}
.search input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
.produits{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.produit{background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.produit img{width:100%;height:140px;object-fit:cover}
.produit h3{padding:8px;font-size:13px}
.produit p{padding:0 8px;color:#E91E63;font-weight:bold}
.produit button{width:100%;padding:8px;background:#25D366;color:white;border:none;cursor:pointer}
.panier-btn{position:fixed;bottom:20px;right:20px;background:#E91E63;color:white;border:none;border-radius:50%;width:60px;height:60px;font-size:24px;cursor:pointer;z-index:50}
#panierModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100}
.panier-content{background:white;margin:5% auto;padding:20px;border-radius:8px;width:90%;max-height:85%;overflow-y:auto}
.item-panier{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.paiement button{width:100%;padding:12px;margin:5px 0;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer}
.orange{background:#FF6600}.wave{background:#35C2F8}.moov{background:#0047AB}.whatsapp{background:#25D366}
.contact{padding:20px;text-align:center;background:white;border-radius:8px;margin-top:10px}
.contact a{display:block;padding:12px;margin:8px 0;background:#25D366;color:white;text-decoration:none;border-radius:8px;font-weight:bold}
</style>
</head>
<body>
<header><h1>Nabila Shopping</h1></header>

<div class="menu">
<button class="actif" onclick="showSection('produits',this)">Produits</button>
<button onclick="showSection('commandes',this)">Commandes</button>
<button onclick="showSection('contact',this)">Contact</button>
</div>

<div id="produits" class="section actif">
<div class="search"><input type="text" id="searchInput" placeholder="Recher sandale..."></div>
<div class="filtres" id="filtres"></div>
<div class="produits" id="liste"></div>
</div>

<div id="commandes" class="section">
<div class="panier-content">
<h2>Ton Panier</h2>
<div id="itemsPanier"></div>
<h3>Total: <span id="total">0</span> FCFA</h3>
<div class="paiement">
<p><b>Paiement Mobile Money :</b></p>
<button class="orange" onclick="alert('Envoie '+document.getElementById('total').innerText+' FCFA sur Orange Money +22607099223')">Orange Money +22607099223</button>
<button class="wave" onclick="alert('Envoie '+document.getElementById('total').innerText+' FCFA sur Wave +22607099223')">Wave +22607099223</button>
<button class="moov" onclick="alert('Envoie '+document.getElementById('total').innerText+' FCFA sur Moov +22601874000')">Moov Money +22601874000</button>
<button class="whatsapp" onclick="commanderWhatsApp()">Confirmer sur WhatsApp</button>
</div>
</div>
</div>

<div id="contact" class="section">
<div class="contact">
<h2>Contact Direct</h2>
<p>Commande ou question ? Écris-nous direct</p>
<a href="https://wa.me/22607099223?text=Bonjour%20Nabila%20Shopping">WhatsApp +22607099223</a>
<p>Orange/Wave : +22607099223<br>Moov : +22601874000</p>
</div>
</div>

<button class="panier-btn" onclick="showSection('commandes',document.querySelector('.menu button:nth-child(2)'))">🛒<span id="nbPanier">0</span></button>

<script>
let produits = [];
let panier = [];

fetch('products.json').then(res=>res.json()).then(data=>{
produits = data;
afficherFiltres();
afficher();
});

document.getElementById('searchInput').oninput = afficher;

function showSection(id,btn){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('actif'));
document.getElementById(id).classList.add('actif');
document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('actif'));
btn.classList.add('actif');
if(id==='commandes') ouvrirPanier();
}

function afficherFiltres(){
const cats = ['Tous', ...new Set(produits.map(p=>p.cat))];
document.getElementById('filtres').innerHTML = cats.map(c => 
`<button onclick="filtrer('${c}')">${c}</button>`
).join('') + '<style>.filtres{display:flex;gap:8px;padding:10px;overflow-x:auto}.filtres button{padding:8px 12px;border:1px solid #E91E63;border-radius:20px;background:white;cursor:pointer}</style>';
}

function filtrer(cat){
window.catActive = cat;
afficher();
}

function afficher(){
const search = document.getElementById('searchInput').value.toLowerCase();
const cat = window.catActive || 'Tous';
let html = "";
produits.forEach((p,i)=>{
if((cat==='Tous' || p.cat===cat) && p.nom.toLowerCase().includes(search)){
html += `<div class="produit">
<img src="${p.img}">
<h3>${p.nom}</h3>
<p>${p.prix} FCFA</p>
<small style="padding:0 8px 8px;display:block">${p.desc}</small>
<button onclick="ajouterPanier(${i})">Ajouter au panier</button>
</div>`;
}
});
document.getElementById('liste').innerHTML = html;
}

function ajouterPanier(i){
panier.push(produits[i]);
document.getElementById('nbPanier').innerText = panier.length;
alert(p.nom + ' ajouté !');
}

function ouvrirPanier(){
let html = ""; let total = 0;
panier.forEach(p=>{
html += `<div class="item-panier"><span>${p.nom}</span><span>${p.prix} FCFA</span></div>`;
total += p.prix;
});
document.getElementById('itemsPanier').innerHTML = html || '<p>Panier vide</p>';
document.getElementById('total').innerText = total;
}

function commanderWhatsApp(){
if(panier.length===0) return alert('Panier vide');
let msg = 'Bonjour Nabila Shopping, je commande:%0A';
panier.forEach(p=>msg += '- '+p.nom+' '+p.prix+' FCFA%0A');
msg += 'Total: '+document.getElementById('total').innerText+' FCFA';
window.open('https://wa.me/22607099223?text='+msg);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
